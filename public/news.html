<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0b">
  <title>뉴스 기록 | TornFi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/site.css?v=20260310">
  <style>
    /* ── News page styles (matches calculator-page card design) ── */
    body.news-page { padding-top: 50px; }

    .news-container {
      position: relative; z-index: 1;
      max-width: 620px; margin: 0 auto;
      padding: 0.5rem 1.5rem 2rem;
    }

    /* Hero banner */
    @keyframes news-hero-shine {
      0%,100% { transform: translateX(-100%); opacity: 0; }
      50%     { transform: translateX(200%); opacity: 1; }
    }
    .news-hero {
      text-align: center;
      margin-bottom: 1.25rem;
      background: linear-gradient(135deg, rgba(0,255,136,0.07) 0%, rgba(255,215,0,0.05) 50%, transparent 100%);
      border: 1px solid rgba(0,255,136,0.15);
      border-radius: 16px;
      padding: 1.5rem 1.25rem;
      position: relative; overflow: hidden;
    }
    .news-hero::before {
      content: '📰'; position: absolute;
      top: 50%; left: 80%;
      transform: translate(-50%,-50%);
      font-size: 8rem; opacity: 0.045;
      pointer-events: none;
    }
    .news-hero::after {
      content: ''; position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      animation: news-hero-shine 7s infinite;
    }
    .news-hero__title {
      position: relative; z-index: 1;
      font-size: 1.3rem; font-weight: 700;
      color: var(--neon);
      letter-spacing: 0.04em; margin: 0 0 0.3rem;
      text-shadow: 0 0 18px rgba(0,255,136,0.2);
    }
    .news-hero__desc {
      position: relative; z-index: 1;
      font-size: 0.78rem; font-weight: 500;
      color: var(--text-muted);
      margin: 0; line-height: 1.4;
    }

    /* Back link */
    .news-back {
      display: inline-flex; align-items: center; gap: 0.3rem;
      color: var(--text-muted); text-decoration: none;
      font-size: 0.8rem; font-weight: 500;
      margin-bottom: 1rem;
      transition: color 0.15s;
    }
    .news-back:hover { color: var(--neon); }
    .news-back svg { width: 16px; height: 16px; }

    /* Card wrapper */
    .news-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.03);
    }
    .news-card__header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem; padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .news-card__title {
      font-size: 0.95rem; font-weight: 700;
      color: var(--neon); letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .news-card__count {
      font-size: 0.72rem; color: var(--text-muted);
      font-weight: 500;
    }

    /* Empty state */
    .news-empty {
      text-align: center; padding: 2.5rem 1rem;
      color: var(--text-muted); font-size: 0.85rem;
    }
    .news-empty__icon { font-size: 2.5rem; margin-bottom: 0.5rem; opacity: 0.5; }

    /* Item list */
    .history-list { list-style: none; padding: 0; margin: 0; }

    @keyframes news-item-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .history-item {
      display: flex; align-items: flex-start; gap: 0.85rem;
      padding: 0.85rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      animation: news-item-in 0.35s ease both;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 6px;
      margin: 0 -0.5rem; padding-left: 0.5rem; padding-right: 0.5rem;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { background: rgba(0,255,136,0.03); }

    /* Source badge */
    .hi-badge {
      flex-shrink: 0;
      display: inline-flex; align-items: center; justify-content: center;
      width: 2.2rem; height: 2.2rem;
      border-radius: 8px;
      font-size: 0.65rem; font-weight: 700;
      color: #000; line-height: 1;
      text-transform: uppercase;
      margin-top: 0.1rem;
    }
    .hi-badge--tp  { background: linear-gradient(135deg, #00ff88, #00cc6a); }
    .hi-badge--bm  { background: linear-gradient(135deg, #60a5fa, #3b82f6); }
    .hi-badge--gn  { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
    .hi-badge--etc { background: linear-gradient(135deg, #a78bfa, #7c3aed); }

    .hi-body { flex: 1; min-width: 0; }

    .hi-title {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.88rem; font-weight: 500;
      color: var(--text); line-height: 1.45;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
      transition: color 0.15s;
    }
    .history-item:hover .hi-title { color: var(--neon); }

    .hi-meta {
      display: flex; align-items: center; gap: 0.4rem;
      margin-top: 0.3rem;
      font-size: 0.72rem; color: var(--text-muted);
    }
    .hi-meta__source { font-weight: 600; }
    .hi-meta__dot { opacity: 0.35; }
    .hi-meta__time { font-variant-numeric: tabular-nums; }

    /* ── Detail Modal ── */
    .detail-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center; justify-content: center;
      animation: modal-bg-in 0.2s ease;
    }
    @keyframes modal-bg-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes modal-card-in {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .detail-card {
      max-width: 620px; width: calc(100% - 2rem);
      margin: auto; padding: 1.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
      animation: modal-card-in 0.25s ease;
      max-height: 80vh; overflow-y: auto;
    }
    .detail-card__head {
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .detail-card__title {
      font-size: 1.05rem; font-weight: 700;
      color: var(--neon); line-height: 1.4; margin: 0;
    }
    .detail-card__close {
      flex-shrink: 0;
      background: rgba(255,255,255,0.04); color: var(--text-muted);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px; padding: 0.35rem 0.65rem;
      font-size: 0.78rem; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .detail-card__close:hover { background: rgba(0,255,136,0.08); color: var(--neon); }
    .detail-card__meta {
      font-size: 0.78rem; color: var(--text-muted);
      margin-bottom: 1rem; padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .detail-card__summary {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.88rem; line-height: 1.7;
      color: var(--text); white-space: pre-line;
    }
    .detail-card__link {
      display: inline-flex; align-items: center; gap: 0.3rem;
      margin-top: 1.25rem; padding: 0.5rem 1rem;
      background: linear-gradient(135deg, rgba(0,255,136,0.12), rgba(0,255,136,0.04));
      border: 1px solid rgba(0,255,136,0.2);
      border-radius: 8px;
      color: var(--neon); text-decoration: none;
      font-size: 0.82rem; font-weight: 600;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .detail-card__link:hover {
      background: linear-gradient(135deg, rgba(0,255,136,0.18), rgba(0,255,136,0.08));
      box-shadow: 0 0 12px rgba(0,255,136,0.15);
    }

    /* Bottom area */
    .news-page-bottom {
      text-align: center; padding: 1.5rem 0 1rem;
      font-size: 0.72rem; color: var(--text-muted);
    }

    /* Responsive */
    @media (max-width: 640px) {
      .news-container { padding: 0.5rem 1rem 1.5rem; }
      .news-hero { padding: 1.2rem 1rem; }
      .news-hero__title { font-size: 1.15rem; }
      .news-card { padding: 1rem; }
      .hi-badge { width: 1.9rem; height: 1.9rem; font-size: 0.58rem; }
      .detail-card { padding: 1.25rem; }
    }
  </style>
</head>
<body class="news-page">
  <!-- Navigation (same as home) -->
  <nav class="site-nav">
    <div class="nav-brand">
      <a href="/" class="nav-logo"><span class="nav-logo-torn">Torn</span><span class="nav-logo-fi">Fi</span></a>
    </div>

  </nav>

  <div class="news-container">
    <!-- Back link -->
    <a href="/calculator.html" class="news-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      배당 조회로 돌아가기
    </a>

    <!-- Hero -->
    <header class="news-hero">
      <h1 class="news-hero__title">🌪️ 뉴스 기록</h1>
      <p class="news-hero__desc">Tornado Cash &amp; TORN 관련 최신 뉴스 모아보기</p>
    </header>

    <!-- Card -->
    <div class="news-card">
      <div class="news-card__header">
        <span class="news-card__title">📋 전체 기사</span>
        <span class="news-card__count" id="newsCount"></span>
      </div>
      <div id="empty" class="news-empty" style="display:none">
        <div class="news-empty__icon">🔍</div>
        최근 180일 이내 뉴스가 없습니다.
      </div>
      <div class="history-list" id="historyList" style="display:none"></div>
    </div>

    <div class="news-page-bottom">© 2026 Torn<span style="color:var(--neon)">Fi</span> Portfolio</div>
  </div>

  <!-- Detail modal -->
  <div class="detail-overlay" id="detailModal">
    <div class="detail-card">
      <div class="detail-card__head">
        <h2 class="detail-card__title" id="detailTitle"></h2>
        <button class="detail-card__close" id="detailClose">✕ 닫기</button>
      </div>
      <div class="detail-card__meta" id="detailMeta"></div>
      <div class="detail-card__summary" id="detailSummary"></div>
      <a class="detail-card__link" id="detailLink" href="#" target="_blank" rel="noopener">원문 보기 →</a>
    </div>
  </div>

  <script>
    // Sync theme preference saved by calculator page so news page shows correct colors
    (function(){
      try {
        const t = localStorage.getItem('torn_theme');
        if (t === 'light') document.body.classList.add('theme-light'); else document.body.classList.remove('theme-light');
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', document.body.classList.contains('theme-light') ? '#ffffff' : '#0a0a0b');
      } catch(e){}
    })();
  </script>

  <script>
    const KEY = 'one_line_news_history_v1';
    const listEl = document.getElementById('historyList');
    const emptyEl = document.getElementById('empty');
    const countEl = document.getElementById('newsCount');

    function esc(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    const KEEP_MS = 180 * 24 * 60 * 60 * 1000;

    function pruneOldEntries() {
      try {
        const raw = localStorage.getItem(KEY);
        const arr = raw ? JSON.parse(raw) : [];
        const cutoff = Date.now() - KEEP_MS;
        const kept = arr.filter(function (it) {
          const t = it.shownAt || it.time || it.published;
          if (!t) return false;
          const ts = Date.parse(t);
          return !isNaN(ts) && ts >= cutoff;
        });
        if (kept.length !== arr.length) localStorage.setItem(KEY, JSON.stringify(kept));
        return kept;
      } catch (e) { return []; }
    }

    /* Source → badge class & label */
    function badgeFor(src) {
      const s = String(src || '').toLowerCase();
      if (s.includes('tokenpost') || s.includes('토큰포스트')) return { cls: 'hi-badge--tp', label: 'TP' };
      if (s.includes('block media') || s.includes('블록미디어') || s.includes('blockmedia')) return { cls: 'hi-badge--bm', label: 'BM' };
      if (s.includes('google')) return { cls: 'hi-badge--gn', label: 'GN' };
      return { cls: 'hi-badge--etc', label: 'NS' };
    }

    /* Relative time */
    function relTime(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      if (isNaN(d)) return '';
      const diff = Date.now() - d.getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return '방금 전';
      if (mins < 60) return mins + '분 전';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + '시간 전';
      const days = Math.floor(hrs / 24);
      if (days < 30) return days + '일 전';
      const months = Math.floor(days / 30);
      if (months < 12) return months + '개월 전';
      return Math.floor(months / 12) + '년 전';
    }

    let itemsGlobal = [];

    function renderItems(items) {
      if (!items || items.length === 0) {
        emptyEl.style.display = '';
        listEl.style.display = 'none';
        countEl.textContent = '';
        return;
      }
      itemsGlobal = items.slice();
      emptyEl.style.display = 'none';
      listEl.style.display = '';
      listEl.innerHTML = '';
      countEl.textContent = items.length + '건';

      for (let i = 0; i < items.length; i++) {
        const it = items[i];
        const text = it.title_ko || it.title || it.text || it.headline || '';
        const src = it.source || '';
        const badge = badgeFor(src);
        const timeStr = it.isoDate || it.pubDate || it.time || it.shownAt || it.published || '';
        const rel = relTime(timeStr);

        const div = document.createElement('div');
        div.className = 'history-item';
        div.style.animationDelay = Math.min(i * 0.04, 0.6) + 's';
        div.setAttribute('data-idx', i);
        div.innerHTML =
          '<div class="hi-badge ' + esc(badge.cls) + '">' + esc(badge.label) + '</div>' +
          '<div class="hi-body">' +
            '<div class="hi-title">' + esc(text) + '</div>' +
            '<div class="hi-meta">' +
              '<span class="hi-meta__source">' + esc(src) + '</span>' +
              (rel ? '<span class="hi-meta__dot">·</span><span class="hi-meta__time">' + esc(rel) + '</span>' : '') +
            '</div>' +
          '</div>';
        div.addEventListener('click', function () { openDetail(Number(this.getAttribute('data-idx'))); });
        listEl.appendChild(div);
      }
    }

    function openDetail(idx) {
      const it = itemsGlobal[idx];
      if (!it) return;
      const modal = document.getElementById('detailModal');
      document.getElementById('detailTitle').textContent = it.title_ko || it.title || '';
      const timeStr = it.isoDate || it.pubDate || it.time || it.shownAt || it.published || '';
      const rel = relTime(timeStr);
      document.getElementById('detailMeta').textContent =
        (it.source || '') + (rel ? ' · ' + rel : '') +
        (timeStr ? ' · ' + new Date(timeStr).toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' }) : '');
      const summary = it.summary_ko || it.summary || '';
      document.getElementById('detailSummary').textContent = summary;
      document.getElementById('detailLink').href = it.link || it.url || '#';
      modal.style.display = 'flex';
      document.getElementById('detailClose').onclick = function () { modal.style.display = 'none'; };
      modal.onclick = function (e) { if (e.target === modal) modal.style.display = 'none'; };
    }

    /* ESC to close modal */
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') document.getElementById('detailModal').style.display = 'none';
    });

    async function loadRemoteThenLocal() {
      try {
        const resp = await fetch('/api/news/latest', { cache: 'no-store' });
        if (resp.ok) {
          const data = await resp.json();
          if (data && data.ok && Array.isArray(data.items) && data.items.length > 0) {
            pruneOldEntries();
            renderItems(data.items);
            return;
          }
        }
      } catch (e) { console.warn('remote failed', e); }
      try {
        const raw = await fetch('/data/news_raw.json', { cache: 'no-store' });
        if (raw.ok) {
          const arr = await raw.json();
          if (Array.isArray(arr) && arr.length) { pruneOldEntries(); renderItems(arr); return; }
        }
      } catch (e) { console.warn('static fallback failed', e); }
      const keptLocal = pruneOldEntries();
      renderItems(keptLocal.slice().reverse());
    }

    loadRemoteThenLocal();
  </script>
