<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>뉴스 기록 | TornFi</title>
  <link rel="stylesheet" href="css/site.css?v=20260310">
  <style>
    body { background: #070707; color: #e6fef0; font-family: 'Noto Sans KR', sans-serif; }
    .wrap { max-width: 760px; margin: 2rem auto; padding: 1rem; }
    h1 { margin-bottom: 0.5rem; color: var(--neon); }
    .history-list { margin-top: 1rem; border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.04); }
    .history-item { display:flex; gap:0.75rem; align-items:flex-start; padding:0.9rem; border-bottom:1px solid rgba(255,255,255,0.02); }
    .history-item:last-child { border-bottom: none; }
    .hi-title { color: var(--neon); font-weight:700; font-size:1rem; }
    .hi-meta { color: var(--text-muted); font-size:0.85rem; margin-top:0.25rem; }
    .controls { display:flex; gap:0.5rem; margin-bottom:0.75rem; }
    a.back { color: var(--text); text-decoration:none; margin-right: auto; }
    button{ background: rgba(255,255,255,0.03); color:var(--text); border:1px solid rgba(255,255,255,0.04); padding:0.45rem 0.7rem; border-radius:6px; cursor:pointer }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="controls">
      <a class="back" href="/calculator.html">← 배당 조회로 돌아가기</a>
    </div>
    <h1>뉴스 기록</h1>
    <div id="empty" style="color:var(--text-muted)">최근 180일 이내에 본 뉴스가 없습니다.</div>
    <div class="history-list" id="historyList" style="display:none"></div>
    <div id="detailModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); align-items:center; justify-content:center;">
      <div style="max-width:760px; width:calc(100% - 2rem); margin:auto; background:#0b0b0b; padding:1rem; border-radius:8px; border:1px solid rgba(255,255,255,0.04);">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:1rem;">
          <h2 id="detailTitle" style="margin:0; font-size:1.1rem; color:var(--neon)"></h2>
          <button id="detailClose">닫기</button>
        </div>
        <div id="detailMeta" style="color:var(--text-muted); font-size:0.9rem; margin-top:0.25rem"></div>
        <div id="detailSummary" style="margin-top:0.75rem; line-height:1.5; color:var(--text);"></div>
        <div style="margin-top:0.75rem"><a id="detailLink" href="#" target="_blank" rel="noopener" style="color:var(--neon);">원문 보기</a></div>
      </div>
    </div>
  </div>

  <script>
    const KEY = 'one_line_news_history_v1';
    const listEl = document.getElementById('historyList');
    const emptyEl = document.getElementById('empty');

    function escapeHtml(s){ return String(s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c];}); }

    // 180일(밀리초)
    const KEEP_MS = 180 * 24 * 60 * 60 * 1000;

    function pruneOldEntries() {
      try {
        const raw = localStorage.getItem(KEY);
        const arr = raw ? JSON.parse(raw) : [];
        const cutoff = Date.now() - KEEP_MS;
        const kept = arr.filter(function(it){
          const t = it.shownAt || it.time || it.published;
          if (!t) return false;
          const ts = Date.parse(t);
          return !isNaN(ts) && ts >= cutoff;
        });
        if (kept.length !== arr.length) {
          localStorage.setItem(KEY, JSON.stringify(kept));
        }
        return kept;
      } catch (e) { console.error(e); return []; }
    }

    let itemsGlobal = [];
    function renderItems(items) {
      if (!items || items.length === 0) {
        emptyEl.style.display = '';
        listEl.style.display = 'none';
        return;
      }
      itemsGlobal = items.slice();
      emptyEl.style.display = 'none';
      listEl.style.display = '';
      listEl.innerHTML = '';
      for (let i = 0; i < items.length; i++) {
        const it = items[i];
        const div = document.createElement('div');
        div.className = 'history-item';
        const left = document.createElement('div');
        left.style.flex = '1';
        const url = it.url || it.link || '#';
        const text = it.title_ko || it.title || it.text || it.headline || '';
        const shownAt = it.shownAt ? new Date(it.shownAt) : (it.published ? new Date(it.published) : null);
        const shownLabel = shownAt ? shownAt.toLocaleString() : '';
        left.innerHTML = `<div class="hi-title"><a href="#" data-idx="${i}" class="open-detail" style="color:inherit;text-decoration:none">${escapeHtml(text)}</a></div>`;
        const meta = document.createElement('div');
        meta.className = 'hi-meta';
        meta.innerHTML = `${escapeHtml(it.source||'')} ${it.time?('· '+escapeHtml(it.time)) : ''} ${shownLabel?('· '+escapeHtml(shownLabel)) : ''}`;
        left.appendChild(meta);
        div.appendChild(left);
        listEl.appendChild(div);
      }

      // attach detail handlers
      const links = listEl.querySelectorAll('.open-detail');
      links.forEach(function(a){
        a.addEventListener('click', function(e){ e.preventDefault(); const idx = Number(this.getAttribute('data-idx')); openDetail(idx); });
      });
    }

    function openDetail(idx) {
      const it = itemsGlobal[idx];
      if (!it) return;
      const modal = document.getElementById('detailModal');
      const t = document.getElementById('detailTitle');
      const m = document.getElementById('detailMeta');
      const s = document.getElementById('detailSummary');
      const l = document.getElementById('detailLink');
      t.textContent = it.title_ko || it.title || '';
      const shownAt = it.shownAt ? new Date(it.shownAt) : (it.published ? new Date(it.published) : null);
      m.textContent = `${it.source || ''} ${shownAt ? '· '+shownAt.toLocaleString() : ''}`;
      s.innerHTML = escapeHtml(it.summary_ko || it.summary || '');
      l.href = it.link || it.url || '#';
      modal.style.display = 'flex';
      document.getElementById('detailClose').onclick = function(){ modal.style.display='none'; };
      modal.onclick = function(e){ if (e.target === modal) modal.style.display='none'; };
    }

    async function loadRemoteThenLocal() {
      try {
        const resp = await fetch('/api/news/latest', {cache: 'no-store'});
        if (resp.ok) {
          const data = await resp.json();
          if (data && data.ok && Array.isArray(data.items) && data.items.length>0) {
            // show server items but still prune local storage
            pruneOldEntries();
            // render server items (most recent first)
            renderItems(data.items.slice().reverse());
            return;
          }
        }
      } catch (e) { console.warn('remote failed', e); }
      // fallback: render local pruned items (most recent first)
      const keptLocal = pruneOldEntries();
      renderItems(keptLocal.slice().reverse());
    }

    // 초기 로드
    loadRemoteThenLocal();
  </script>
