<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0b">
  <title>뉴스 기록 | TornFi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/site.css?v=20260321">
  <script>try{if(localStorage.getItem('torn_theme')==='light')document.documentElement.classList.add('theme-light-root')}catch(e){}</script>
</head>
<body class="news-page">
  <script>try{if(localStorage.getItem('torn_theme')==='light')document.body.classList.add('theme-light')}catch(e){}</script>
  <nav class="site-nav">
    <div class="nav-brand">
      <a href="/" class="nav-logo"><span class="nav-logo-torn">Torn</span><span class="nav-logo-fi">Fi</span></a>
    </div>
    <button id="theme-toggle" class="nav-theme-toggle" aria-label="테마 전환" title="라이트/다크 모드 전환">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="12" cy="12" r="5" fill="currentColor"></circle>
      </svg>
    </button>
    <div class="nav-right">
      <a id="nav-chat" class="nav-chat-button" aria-label="대화" title="대화" href="https://t.me/koreatornadocash" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 2C6.48 2 2 5.58 2 10c0 2.24 1.12 4.27 2.94 5.72L4 20l4.46-2.23C9.56 18.08 10.75 18.2 12 18.2c5.52 0 10-3.58 10-8C22 5.58 17.52 2 12 2z" fill="currentColor"/>
          <circle cx="8" cy="10" r="1.2" fill="var(--bg-dark)"/>
          <circle cx="12" cy="10" r="1.2" fill="var(--bg-dark)"/>
          <circle cx="16" cy="10" r="1.2" fill="var(--bg-dark)"/>
        </svg>
      </a>
    </div>
  </nav>

  <div class="news-container">
    <header class="news-hero">
      <h1 class="news-hero__title">🌪️ 뉴스 기록</h1>
      <p class="news-hero__desc">Tornado Cash &amp; TORN 관련 최신 뉴스 모아보기</p>
    </header>

    <div class="news-card">
      <div class="news-card__header">
        <span class="news-card__title">📋 전체 기사</span>
        <span class="news-card__count" id="newsCount"></span>
      </div>
      <div id="empty" class="news-empty" style="display:none">
        <div class="news-empty__icon">🔍</div>
        최근 180일 이내 뉴스가 없습니다.
      </div>
      <div class="history-list" id="historyList" style="display:none"></div>
    </div>

    <script>
    window.addEventListener('storage', function(e) {
      if (e.key === 'torn_theme') {
        try {
          document.body.classList.toggle('theme-light', e.newValue === 'light');
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', e.newValue === 'light' ? '#ffffff' : '#0a0a0b');
        } catch (err) {}
      }
    });

    var listEl = document.getElementById('historyList');
    var emptyEl = document.getElementById('empty');
    var countEl = document.getElementById('newsCount');

    function esc(s) {
      return String(s).replace(/[&<>"']/g, function(c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    function badgeFor(src) {
      var s = String(src || '').toLowerCase();
      if (s.includes('google')) return { cls: 'hi-badge--gn', label: 'GN' };
      if (s.includes('토큰포스트')) return { cls: 'hi-badge--tp', label: 'TP' };
      if (s.includes('블록미디어')) return { cls: 'hi-badge--bm', label: 'BM' };
      if (s.includes('블록스트리트')) return { cls: 'hi-badge--bs', label: 'BS' };
      return { cls: 'hi-badge--etc', label: 'NEWS' };
    }

    function relTime(dateStr) {
      if (!dateStr) return '';
      var d = new Date(dateStr);
      if (isNaN(d)) return '';
      var diff = Date.now() - d.getTime();
      var mins = Math.floor(diff / 60000);
      if (mins < 1) return '방금 전';
      if (mins < 60) return mins + '분 전';
      var hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + '시간 전';
      var days = Math.floor(hrs / 24);
      if (days < 30) return days + '일 전';
      var months = Math.floor(days / 30);
      if (months < 12) return months + '개월 전';
      return Math.floor(months / 12) + '년 전';
    }

    function render(items) {
      if (!items || items.length === 0) {
        emptyEl.style.display = '';
        listEl.style.display = 'none';
        countEl.textContent = '';
        return;
      }
      emptyEl.style.display = 'none';
      listEl.style.display = '';
      countEl.textContent = items.length + '건';

      var sig = items.length + ':' + (items[0] ? (items[0].timestamp || items[0].isoDate || '') : '');
      if (listEl.dataset.sig === sig) return;
      listEl.dataset.sig = sig;

      var frag = document.createDocumentFragment();
      for (var i = 0; i < items.length; i++) {
        var it = items[i];
        var text = it.title || '';
        var src = it.source || '';
        var badge = badgeFor(src);
        var timeStr = it.isoDate || it.pubDate || '';
        var rel = relTime(timeStr);
        var url = it.link || '#';

        var a = document.createElement('a');
        a.className = 'history-item';
        a.href = url;
        a.target = '_blank';
        a.rel = 'noopener';
        a.style.animationDelay = Math.min(i * 0.04, 0.6) + 's';
        a.style.textDecoration = 'none';
        a.style.color = 'inherit';
        a.innerHTML =
          '<div class="hi-badge ' + esc(badge.cls) + '">' + esc(badge.label) + '</div>' +
          '<div class="hi-body">' +
            '<div class="hi-title">' + esc(text) + '</div>' +
            '<div class="hi-meta">' +
              '<span class="hi-meta__source">' + esc(src) + '</span>' +
              (rel ? '<span class="hi-meta__dot">·</span><span class="hi-meta__time">' + esc(rel) + '</span>' : '') +
            '</div>' +
          '</div>';
        frag.appendChild(a);
      }
      listEl.innerHTML = '';
      listEl.appendChild(frag);
    }

    async function loadNews() {
      try {
        var resp = await fetch('/api/news/latest', { cache: 'no-store' });
        if (!resp.ok) throw new Error(resp.status);
        var data = await resp.json();
        if (data && data.ok && Array.isArray(data.items)) {
          render(data.items);
        }
      } catch (e) {
        console.warn('뉴스 로드 실패:', e);
      }
    }

    loadNews();
    setInterval(loadNews, 5 * 60 * 1000);
    </script>
    <script src="/js/theme.js?v=20260321"></script>
  </div>
</body>
</html>
