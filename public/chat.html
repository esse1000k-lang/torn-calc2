<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0b">
  <title>익명 채팅 | TornFi Portfolio</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="manifest" href="/manifest.json">
  <script src="js/pwa-env.js?v=20260310"></script>
  <script src="js/autocomplete-off.js?v=20260310"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/site.css?v=20260310">
  <link rel="stylesheet" href="css/chat.css">
  <style>
    /* 초고속 TORN 채팅 전용 스타일 */
    .torn-chat-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .torn-chat-header {
      padding: 1rem;
      background: rgba(17, 24, 39, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .torn-chat-title {
      font-size: 1.25rem;
      font-weight: 900;
      color: #00ff88;
      letter-spacing: -0.025em;
    }

    .torn-chat-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: #00ff88;
      font-weight: 600;
    }

    .torn-chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      background: linear-gradient(to bottom, #111827, #000);
    }

    .torn-message {
      margin-bottom: 1rem;
      animation: fadeInUp 0.2s ease-out;
    }

    .torn-message-user {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.25rem;
      font-size: 0.7rem;
      color: #6b7280;
      text-transform: uppercase;
      font-weight: 700;
    }

    .torn-message-time {
      font-size: 0.6rem;
      color: #374151;
      font-family: 'Monaco', 'Menlo', monospace;
    }

    .torn-message-bubble {
      background: rgba(31, 41, 55, 0.9);
      padding: 0.75rem 1rem;
      border-radius: 1.125rem;
      border-top-left-radius: 0.25rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #f9fafb;
      font-size: 0.95rem;
      line-height: 1.4;
      word-break: break-word;
      max-width: 85%;
    }

    .torn-chat-input-area {
      padding: 1rem;
      background: rgba(17, 24, 39, 0.95);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .torn-chat-form {
      display: flex;
      align-items: flex-end;
      gap: 0.75rem;
    }

    .torn-chat-input-wrapper {
      flex: 1;
      background: rgba(31, 41, 55, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 1.5rem;
      padding: 0.75rem 1rem;
      transition: border-color 0.15s ease;
    }

    .torn-chat-input-wrapper:focus-within {
      border-color: #00ff88;
    }

    .torn-chat-input {
      width: 100%;
      background: transparent;
      border: none;
      color: #f9fafb;
      font-size: 1rem;
      resize: none;
      outline: none;
      line-height: 1.4;
      max-height: 120px;
    }

    .torn-chat-input::placeholder {
      color: #6b7280;
    }

    .torn-chat-send {
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      background: linear-gradient(135deg, #00ff88, #00cc6a);
      border: none;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.1s ease, filter 0.1s ease;
      flex-shrink: 0;
    }

    .torn-chat-send:hover {
      filter: brightness(1.1);
    }

    .torn-chat-send:active {
      transform: scale(0.95);
    }

    .torn-ping {
      width: 0.5rem;
      height: 0.5rem;
      background: #00ff88;
      border-radius: 50%;
      position: relative;
    }

    .torn-ping::before {
      content: '';
      position: absolute;
      inset: -0.25rem;
      background: #00ff88;
      border-radius: 50%;
      opacity: 0.4;
      animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(0.5rem);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes ping {
      75%, 100% {
        transform: scale(2);
        opacity: 0;
      }
    }

    /* 기존 스타일 오버라이드 */
    body.chat-page {
      background: #000 !important;
      padding: 0 !important;
    }

    .chat-page-main {
      display: none !important;
    }
  </style>
</head>
<body class="chat-page">
  <!-- 기존 채팅 구조는 숨기고 DOGE 채팅 표시 -->
  <div class="chat-watermark" aria-hidden="true" style="display: none;">
    <div class="chat-watermark__logo"><span class="watermark-torn">Torn</span><span class="watermark-fi">Fi</span></div>
  </div>
  <a href="/" class="chat-back-float" aria-label="배당 조회로 돌아가기" style="display: none;">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M3 10.5l9-7 9 7"></path>
      <path d="M5 10.5v8.5h14v-8.5"></path>
      <path d="M10 19v-5h4v5"></path>
    </svg>
  </a>

  <!-- 초고속 TORN 채팅 컨테이너 -->
  <div class="torn-chat-container">
    <header class="torn-chat-header">
      <div>
        <h1 class="torn-chat-title">TORN-CHAT</h1>
        <p class="text-xs text-gray-500">토네이도 익명 채팅</p>
      </div>
      <div class="torn-chat-status">
        <span class="torn-ping"></span>
        <span>LIVE</span>
      </div>
    </header>

    <main class="torn-chat-messages" id="tornMessages">
      <div class="text-center py-12 text-gray-600 text-sm">
        <p class="mt-1 opacity-60">페이지 제작자를 응원하는 공간입니다.</p>
      </div>
    </main>

    <footer class="torn-chat-input-area">
      <form class="torn-chat-form" id="tornChatForm">
        <div class="torn-chat-input-wrapper">
          <textarea 
            id="tornChatInput" 
            class="torn-chat-input" 
            placeholder="응원의 한마디!" 
            rows="1"
          ></textarea>
        </div>
        <button type="submit" class="torn-chat-send">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </form>
    </footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // 초고속 Socket.IO 연결
    const socket = io({ transports: ['websocket'] });
    const messagesContainer = document.getElementById('tornMessages');
    const form = document.getElementById('tornChatForm');
    const input = document.getElementById('tornChatInput');

    // 접속 즉시 TORN 방 참여
    socket.emit('join', 'torn-room');

    // 메시지 수신 처리 (초고속)
    socket.on('chat', (data) => {
      const messageDiv = document.createElement('div');
      messageDiv.className = 'torn-message';
      messageDiv.innerHTML = `
        <div class="torn-message-user">
          <span>${data.user}</span>
          <span class="torn-message-time">${data.time}</span>
        </div>
        <div class="torn-message-bubble">
          ${escapeHtml(data.text)}
        </div>
      `;
      
      messagesContainer.appendChild(messageDiv);
      // 즉시 하단 스크롤 (앱 수준 반응속도)
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    });

    // 엔터키 전송 (모바일 최적화)
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        form.dispatchEvent(new Event('submit'));
      }
    });

    // 메시지 전송
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (text) {
        socket.emit('message', { room: 'torn-room', text: text });
        input.value = '';
        input.style.height = 'auto';
      }
    });

    // 자동 높이 조절
    input.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // XSS 방지 함수
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 초기 포커스
    setTimeout(() => input.focus(), 100);
  </script>
</body>
</html>
