<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0b">
  <title>익명 채팅 | TornFi Portfolio</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="manifest" href="/manifest.json">
  <script src="js/pwa-env.js"></script>
  <script src="js/autocomplete-off.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/site.css">
  <link rel="stylesheet" href="css/chat.css">
</head>
<body class="chat-page">
  <div class="chat-watermark" aria-hidden="true">
    <div class="chat-watermark__logo"><span class="watermark-torn">Torn</span><span class="watermark-fi">Fi</span></div>
  </div>
  <a href="/" class="chat-back-float" aria-label="배당 조회로 돌아가기">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M3 10.5l9-7 9 7"></path>
      <path d="M5 10.5v8.5h14v-8.5"></path>
      <path d="M10 19v-5h4v5"></path>
    </svg>
  </a>

  <main class="site-main chat-page-main">
    <section id="chat" class="section chat-section">
      <div id="chatWrap" class="chat-wrap">
        <div id="chatPanel" class="chat-panel">
          <div class="chat-info-banner">페이지 제작자에게 응원 메시지를 남기는 공간입니다.</div>
          <div id="chatMsgDropdown" class="chat-msg-dropdown" style="display:none;">
            <button type="button" class="chat-msg-dropdown__item" data-action="sendHeart"> 좋아요</button>
            <button type="button" class="chat-msg-dropdown__item" data-action="reply"> 답장</button>
            <button type="button" class="chat-msg-dropdown__item" data-action="copy"> 복사</button>
            <button type="button" class="chat-msg-dropdown__item" data-action="edit"> 수정</button>
            <button type="button" class="chat-msg-dropdown__item" data-action="delete"> 삭제</button>
          </div>

          <div class="chat-messages-area">
            <div id="chatMessages" class="chat-messages"></div>
          </div>

          <div id="chatReplyBar" class="chat-reply-bar" style="display:none;">
            <span id="chatReplyText" class="chat-reply-bar__text"></span>
            <button type="button" id="chatReplyCancel" class="chat-reply-bar__cancel">취소</button>
          </div>

          <div id="chatPreviewWrap" class="chat-preview-wrap" style="display:none;">
            <img id="chatPreviewImg" class="chat-preview-img" alt="첨부 미리보기">
            <button type="button" id="chatPreviewRemove" class="chat-preview-remove" aria-label="첨부 취소"></button>
          </div>

          <div class="chat-input-wrap">
            <input type="file" id="chatImage" class="chat-file-input" accept="image/jpeg,image/png,image/gif,image/webp" aria-label="사진 첨부">
            <button type="button" id="chatAttach" class="chat-attach-btn" title="사진 첨부" aria-label="사진 첨부"></button>
            <input type="text" id="chatInput" class="chat-input" placeholder="메시지 입력" maxlength="500" autocomplete="off">
            <button type="button" id="chatSend" class="chat-send">전송</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="chatEditModal" class="chat-edit-modal" role="dialog" aria-modal="true" style="display:none;">
    <div class="chat-edit-modal__backdrop"></div>
    <div class="chat-edit-modal__box">
      <p class="chat-edit-modal__title"> 메시지 수정</p>
      <textarea id="chatEditModalInput" class="chat-edit-modal__input" maxlength="500" rows="4"></textarea>
      <div class="chat-edit-modal__actions">
        <button type="button" id="chatEditModalCancel" class="chat-edit-modal__btn chat-edit-modal__btn--cancel">취소</button>
        <button type="button" id="chatEditModalConfirm" class="chat-edit-modal__btn chat-edit-modal__btn--confirm">확인</button>
      </div>
    </div>
  </div>

  <div id="chatDeleteModal" class="chat-delete-modal" role="dialog" aria-modal="true" style="display:none;">
    <div class="chat-delete-modal__backdrop"></div>
    <div class="chat-delete-modal__box">
      <p class="chat-delete-modal__title">이 메시지를 삭제할까요?</p>
      <div class="chat-delete-modal__actions">
        <button type="button" id="chatDeleteModalCancel" class="chat-delete-modal__btn chat-delete-modal__btn--cancel">취소</button>
        <button type="button" id="chatDeleteModalConfirm" class="chat-delete-modal__btn chat-delete-modal__btn--confirm">삭제</button>
      </div>
    </div>
  </div>

  <div id="chatSendHeartLayer" class="chat-send-heart-layer" style="display:none;">
    <div class="chat-send-heart-box">
      <h3 class="chat-send-heart-title"> 좋아요</h3>
      <p id="chatSendHeartMessage" class="chat-send-heart-message"></p>
      <div class="chat-send-heart-actions">
        <button type="button" id="chatSendHeartCancel" class="chat-send-heart-btn chat-send-heart-btn--cancel">취소</button>
        <button type="button" id="chatSendHeartOk" class="chat-send-heart-btn chat-send-heart-btn--ok">좋아요</button>
      </div>
    </div>
  </div>

  <script src="js/chat-page.js"></script>
</body>
</html>
