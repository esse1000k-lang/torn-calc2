<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0b">
  <title>회원 등급 | TornFi</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="manifest" href="/manifest.json">
  <script src="js/pwa-env.js"></script>
  <script src="js/autocomplete-off.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/site.css">
  <style>
    .mg-page { max-width: 720px; margin: 0 auto; padding: 2rem 1rem; }
    .mg-title { font-size: 1.25rem; font-weight: 700; color: var(--neon); margin-bottom: 0.5rem; }
    .mg-desc { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1.5rem; }
    .mg-table-wrap { max-width: 420px; overflow-x: auto; -webkit-overflow-scrolling: touch; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; }
    .mg-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    .mg-table th, .mg-table td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .mg-table thead th { color: var(--text-muted); font-weight: 500; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; background: rgba(0, 0, 0, 0.2); }
    .mg-table tbody tr:last-child td { border-bottom: none; }
    .mg-table .level-icon { margin-right: 0.35rem; }
    .mg-table--admin { background: rgba(0, 255, 136, 0.06); }
    .mg-table--admin td { color: var(--text-muted); }
    .mg-table--admin td:last-child { color: var(--neon); font-weight: 500; }
    .mg-table--admin td a { color: var(--neon); text-decoration: none; }
    .mg-table--admin td a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav class="site-nav">
    <div class="nav-brand">
      <a href="/" class="nav-logo">TornFi</a>
    </div>
    <a href="/admin.html" class="nav-admin-center" id="navAdminCenter" aria-label="관리자" style="display:none;">🛠️</a>
  </nav>

  <div class="mg-page">
    <h1 class="mg-title">회원 등급표</h1>
    <p class="mg-desc">등급은 이더스캔 기반 자동 반영.</p>

    <div class="mg-table-wrap">
      <table class="mg-table" aria-label="회원 등급표">
        <thead>
          <tr>
            <th>등급</th>
            <th>레벨</th>
            <th>스테이킹 기준 (TORN)</th>
          </tr>
        </thead>
        <tbody>
          <tr><td><span class="level-icon" aria-hidden="true">🐚</span> 조개</td><td>Lv.1</td><td>1개 미만</td></tr>
          <tr><td><span class="level-icon" aria-hidden="true">🦐</span> 새우</td><td>Lv.2</td><td>1,000개 미만</td></tr>
          <tr><td><span class="level-icon" aria-hidden="true">🐙</span> 문어</td><td>Lv.3</td><td>2,000개 미만</td></tr>
          <tr><td><span class="level-icon" aria-hidden="true">🦭</span> 물개</td><td>Lv.4</td><td>3,000개 미만</td></tr>
          <tr><td><span class="level-icon" aria-hidden="true">🦈</span> 상어</td><td>Lv.5</td><td>4,000개 미만</td></tr>
          <tr><td><span class="level-icon" aria-hidden="true">🐋</span> 고래</td><td>Lv.6</td><td>4,000개 이상</td></tr>
          <tr class="mg-table--admin"><td><span class="level-icon" aria-hidden="true">🛠️</span> 관리자</td><td>—</td><td>선출</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/nav-logo.js"></script>
  <script>
    (function () {
      var navAdminCenter = document.getElementById('navAdminCenter');
      function updateNav(user) {
        if (navAdminCenter) navAdminCenter.style.display = (user && user.isAdmin) ? 'inline-flex' : 'none';
      }
      if (window.TornFiAuth) {
        window.TornFiAuth.onUser(updateNav);
        if (window.TornFiAuth.getUser()) updateNav(window.TornFiAuth.getUser());
        else window.TornFiAuth.init().then(function () { updateNav(window.TornFiAuth.getUser()); });
      }
    })();
  </script>
</body>
</html>
