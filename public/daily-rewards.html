<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0d0e">
  <title>TORN 리워드 전체 유입 | TornFi</title>
  <style>
    :root { --bg:#0b0d0e; --txt:#e7e9ea; --mut:#9aa0a6; --chip:#121415; --neon:#39ff14; --neon2:#1df2a1; }
    html,body { height:100%; }
    body { margin:0; background:var(--bg); color:var(--txt); font-family: 'Noto Sans KR', system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    .wrap { max-width:640px; margin:0 auto; padding:16px; }
    .title { font-size:20px; font-weight:700; letter-spacing:-0.3px; }
    .sub { margin-top:6px; font-size:12px; color:var(--mut); }
    .bar { display:flex; gap:8px; margin-top:12px; }
    .chip { flex:1; padding:10px 12px; border-radius:12px; background:linear-gradient(180deg,#101214 0%, #0b0d0e 100%); border:1px solid #15181b; display:flex; justify-content:space-between; align-items:center; }
    .chip .k { font-size:12px; color:var(--mut); }
    .chip .v { font-size:14px; font-weight:600; }
    .actions { display:flex; gap:8px; margin-top:12px; }
    .btn { flex:1; padding:12px 16px; border-radius:12px; border:none; font-size:14px; font-weight:600; }
    .btn-primary { background: radial-gradient(80% 80% at 50% 50%, rgba(57,255,20,0.15) 0%, rgba(57,255,20,0.05) 60%, rgba(57,255,20,0.02) 100%); color:var(--neon); border:1px solid rgba(57,255,20,0.35); }
    .btn-secondary { background:#121415; color:var(--txt); border:1px solid #191c20; }
    .list { margin-top:14px; border-radius:12px; overflow:hidden; border:1px solid #15181b; }
    .row { display:flex; justify-content:space-between; align-items:center; padding:12px 14px; background:#0d0f10; }
    .row:nth-child(even){ background:#0c0e0f; }
    .date { font-size:14px; color:#c9ced6; }
    .amt { font-size:15px; font-weight:700; color:var(--neon); }
    .footer { margin-top:14px; display:flex; justify-content:space-between; font-size:12px; color:var(--mut); }
    .link { color:var(--neon2); text-decoration:none; }
    @media (min-width:480px){ .title{font-size:22px} .amt{font-size:16px} }
    .float-btn { position: fixed; top: calc(10px + env(safe-area-inset-top)); right: calc(10px + env(safe-area-inset-right)); width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; background:#121415; border:1px solid rgba(57,255,20,0.35); color:var(--neon); box-shadow: 0 0 12px rgba(57,255,20,0.12); z-index: 20; }
    .float-btn:active { transform: scale(0.98); }
    .float-btn svg { width:22px; height:22px; }
    .float-btn svg path { stroke: var(--neon); }
  </style>
</head>
<body>
  <button id="backBtn" class="float-btn" aria-label="이전으로">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M14 7l-5 5 5 5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <div class="wrap">
    <div class="title">TORN 리워드 전체 유입</div>
    <div class="sub">배당 컨트랙트 기준 · 한국 시간 하루(00:00~23:59)</div>
    <div class="bar">
      <div class="chip">
        <div class="k">업데이트(자정 이후)</div>
        <div class="v" id="lastBuilt">로딩 중</div>
      </div>
    </div>
    <div class="actions">
      <button id="rebuildBtn" class="btn btn-primary">갱신</button>
    </div>
    <div class="list" id="rows"></div>
    <div class="footer" style="justify-content:center">
      <a class="link" href="/">돌아가기</a>
    </div>
  </div>
  <script>
    (function () {
      function formatNum(n) {
        if (n == null || !isFinite(n)) return '0';
        return Number(n).toLocaleString('en', { minimumFractionDigits: 0, maximumFractionDigits: 6 });
      }
      function load(days) {
        var url = '/api/inflow/daily-series' + (days ? ('?days=' + encodeURIComponent(days) + '&tz=kst') : '?tz=kst');
        fetch(url).then(function (r) { return r.json(); }).then(function (d) {
          var rows = document.getElementById('rows');
          var lastBuilt = document.getElementById('lastBuilt');
          if (!d || d.ok !== true) { lastBuilt.textContent = '오류'; return; }
          lastBuilt.textContent = new Date(d.lastBuiltUtc || Date.now()).toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });
          rows.innerHTML = '';
          var items = Array.isArray(d.items) ? d.items.slice().sort(function(a,b){ return a.dateUtc < b.dateUtc ? 1 : -1; }) : [];
          items.forEach(function (it) {
            var row = document.createElement('div');
            row.className = 'row';
            var dateEl = document.createElement('div');
            dateEl.className = 'date';
            dateEl.textContent = it.dateUtc;
            var amtEl = document.createElement('div');
            amtEl.className = 'amt';
            amtEl.textContent = formatNum(it.tornInflow);
            row.appendChild(dateEl);
            row.appendChild(amtEl);
            rows.appendChild(row);
          });
        }).catch(function () {
          var lastBuilt = document.getElementById('lastBuilt');
          lastBuilt.textContent = '네트워크 오류';
        });
      }
      load(30);
      document.getElementById('rebuildBtn').addEventListener('click', function () {
        var lastBuilt = document.getElementById('lastBuilt');
        lastBuilt.textContent = '갱신 중...';
        fetch('/api/inflow/rebuild?days=30&tz=kst', { method: 'POST' }).then(function (r) { return r.json(); }).then(function () {
          load(30);
        }).catch(function () { lastBuilt.textContent = '갱신 오류'; });
      });
      document.getElementById('backBtn').addEventListener('click', function () {
        if (window.history.length > 1) { window.history.back(); } else { window.location.href = '/'; }
      });
    })();
  </script>
</body>
</html>
