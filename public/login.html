<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=overlays-content">
  <meta name="theme-color" content="#0a0a0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>로그인 | TornFi</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="manifest" href="/manifest.json">
  <script src="js/pwa-env.js"></script>
  <script src="js/autocomplete-off.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/site.css">
</head>
<body>
  <nav class="site-nav">
    <div class="nav-brand">
      <a href="/" class="nav-logo">TornFi</a>
    </div>
    <a href="/admin.html" class="nav-admin-center" id="navAdminCenter" aria-label="관리자" style="display:none;">🛠️</a>
    <div class="nav-right">
      <a href="/register.html" class="nav-register">회원가입</a>
    </div>
  </nav>

  <div class="auth-page auth-page--login">
    <div class="auth-card auth-card--login">
      <h1 class="auth-title" id="loginTitleClick" role="button" tabindex="0"><span class="auth-title-emoji" aria-hidden="true">👋</span> 로그인</h1>
      <div class="auth-form">
        <div class="login-id-wrap" id="loginIdWrap">
          <span class="login-id-typing" id="loginIdTyping" aria-hidden="true"><span class="login-id-typing-text">닉네임 입력</span><span class="login-id-typing-cursor">|</span></span>
          <input type="text" id="loginId" name="id" autocomplete="username" placeholder=" " aria-label="닉네임 입력">
        </div>
        <p class="auth-error" id="authError"></p>
        <div class="rhythm-drum-wrap">
          <div class="rhythm-drum-area" id="rhythmDrum" role="button" tabindex="0" aria-label="리듬 입력 영역, 북을 두드려 로그인">
            <div class="rhythm-drum" id="rhythmDrumVisual"></div>
            <p class="rhythm-drum-count" id="rhythmDrumCount" aria-live="polite"></p>
          </div>
          <p class="rhythm-drum-hint">북치기로 본인 인증</p>
        </div>
      </div>
      <div id="loginPasswordBlock" class="login-password-block" style="display:none;">
        <label for="loginPassword">비밀번호</label>
        <input type="password" id="loginPassword" placeholder="비밀번호" autocomplete="current-password">
        <button type="button" id="loginWithPasswordBtn" class="login-password-btn">로그인</button>
      </div>
    </div>
  </div>

  <script src="js/rhythm.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav-logo.js"></script>
  <script>
    (function () {
      var errorEl = document.getElementById('authError');
      var loginIdEl = document.getElementById('loginId');
      var drumArea = document.getElementById('rhythmDrum');
      var drumVisual = document.getElementById('rhythmDrumVisual');
      var countEl = document.getElementById('rhythmDrumCount');

      function playDrumHit() {
        if (!drumArea || !drumVisual) return;
        drumArea.classList.add('hit');
        var ring = document.createElement('div');
        ring.className = 'rhythm-drum-ring';
        drumArea.appendChild(ring);
        setTimeout(function () { drumArea.classList.remove('hit'); }, 220);
        setTimeout(function () {
          if (ring.parentNode) ring.parentNode.removeChild(ring);
        }, 650);
      }

      var stopRecording = null;

      function startDrumRecorder() {
        if (stopRecording) try { stopRecording(); } catch (e) {}
        if (!drumArea || !window.TornFiRhythm) return;
        stopRecording = window.TornFiRhythm.recordRhythm(drumArea, {
          onStart: function () {
            if (countEl) countEl.textContent = '';
            if (errorEl) errorEl.textContent = '';
          },
          onTap: function (n) {
            playDrumHit();
            if (countEl) {
              countEl.textContent = n;
              countEl.classList.remove('rhythm-drum-count--pop');
              countEl.offsetHeight;
              countEl.classList.add('rhythm-drum-count--pop');
              clearTimeout(countEl._popTimer);
              countEl._popTimer = setTimeout(function () { countEl.classList.remove('rhythm-drum-count--pop'); }, 220);
            }
          },
          onComplete: function (timestamps) {
            if (countEl) countEl.textContent = '확인 중…';
            drumArea.setAttribute('aria-disabled', 'true');

            var nickname = loginIdEl ? loginIdEl.value.trim() : '';
            if (!nickname) {
              if (errorEl) errorEl.textContent = '닉네임을 입력해 주세요.';
              if (countEl) countEl.textContent = '';
              drumArea.removeAttribute('aria-disabled');
              startDrumRecorder();
              return;
            }
            if (!timestamps || timestamps.length < window.TornFiRhythm.RHYTHM_MIN_TAPS) {
              if (errorEl) errorEl.textContent = '리듬을 4번 이상 두드려 주세요.';
              if (countEl) countEl.textContent = '';
              drumArea.removeAttribute('aria-disabled');
              startDrumRecorder();
              return;
            }

            window.TornFiAuth.loginWithRhythm(nickname, timestamps)
              .then(function () {
                window.location.href = '/';
              })
              .catch(function (err) {
                if (errorEl) errorEl.textContent = (err && err.message) || '닉네임 또는 리듬이 맞지 않아요. 다시 두드려 주세요.';
                if (countEl) countEl.textContent = '';
                drumArea.removeAttribute('aria-disabled');
                startDrumRecorder();
              });
          },
        });
      }

      startDrumRecorder();

      (function () {
        var wrap = document.getElementById('loginIdWrap');
        var loginInput = document.getElementById('loginId');
        if (wrap && loginInput) {
          function hideTyping() { wrap.classList.add('login-id-wrap--hide-typing'); }
          function checkBlur() {
            if (!loginInput.value.trim()) wrap.classList.remove('login-id-wrap--hide-typing');
          }
          loginInput.addEventListener('focus', hideTyping);
          loginInput.addEventListener('click', hideTyping);
          loginInput.addEventListener('blur', checkBlur);
        }
      })();

      (function () {
        var loginTitle = document.getElementById('loginTitleClick');
        var passwordBlock = document.getElementById('loginPasswordBlock');
        var passwordInput = document.getElementById('loginPassword');
        var passwordBtn = document.getElementById('loginWithPasswordBtn');
        var clickCount = 0;
        if (loginTitle && passwordBlock) {
          loginTitle.addEventListener('click', function (e) {
            e.preventDefault();
            clickCount += 1;
            if (clickCount >= 5) {
              passwordBlock.style.display = 'block';
              if (passwordInput) passwordInput.focus();
            }
          });
        }
        if (passwordBtn && loginIdEl && passwordInput) {
          passwordBtn.addEventListener('click', function () {
            var nickname = loginIdEl.value.trim();
            var pwd = passwordInput.value;
            if (!nickname) { if (errorEl) errorEl.textContent = '닉네임을 입력해 주세요.'; return; }
            if (!pwd) { if (errorEl) errorEl.textContent = '비밀번호를 입력해 주세요.'; return; }
            if (errorEl) errorEl.textContent = '';
            passwordBtn.disabled = true;
            window.TornFiAuth.login(nickname, pwd)
              .then(function () { window.location.href = '/'; })
              .catch(function (err) {
                if (errorEl) errorEl.textContent = (err && err.message) || '닉네임 또는 비밀번호가 맞지 않아요.';
                passwordBtn.disabled = false;
              });
          });
        }
      })();

      window.TornFiAuth.onUser(function (u) {
        var nbtn = document.getElementById('navMenuBtn');
        var nac = document.getElementById('navAdminCenter');
        if (u) {
          if (nbtn) nbtn.style.display = 'none';
          if (nac) nac.style.display = u.isAdmin ? 'inline-flex' : 'none';
        } else {
          if (nbtn) nbtn.style.display = 'none';
          if (nac) nac.style.display = 'none';
        }
      });
    })();
  </script>
</body>
</html>
