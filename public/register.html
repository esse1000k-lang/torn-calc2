<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>회원가입 | TornFi</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="manifest" href="/manifest.json">
  <script src="js/pwa-env.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/site.css">
</head>
<body>
  <nav class="site-nav">
    <div class="nav-brand">
      <a href="/" class="nav-logo">TornFi</a>
    </div>
    <a href="/admin.html" class="nav-admin-center" id="navAdminCenter" aria-label="관리자" style="display:none;">🛠️</a>
    <div class="nav-menu-wrap">
      <button type="button" class="nav-menu-btn" id="navMenuBtn" aria-label="메뉴" aria-expanded="false" aria-haspopup="true">☰</button>
      <div class="nav-menu-dropdown" id="navMenuDropdown" role="menu"></div>
    </div>
  </nav>

  <div class="auth-page auth-page--register auth-page--steps">
    <div class="auth-card auth-card--register">
      <div class="register-steps" id="registerSteps">
        <!-- 1페이지: 아이디 -->
        <div class="register-step" id="step1" data-step="1">
          <p class="register-step-label">1</p>
          <h2 class="register-step-title">아이디를 입력해 주세요!</h2>
          <p class="register-step-desc">영문, 숫자만 5~12자</p>
          <p class="auth-error" id="authError"></p>
          <div class="register-step-inner">
            <input type="text" id="displayName" autocomplete="username" placeholder="닉네임 입력" minlength="5" maxlength="12">
            <p class="nickname-validation" id="nicknameValidation" aria-live="polite" role="status"></p>
            <button type="button" id="btnNext1" class="auth-submit-btn register-step-btn" disabled>다음</button>
          </div>
          <p class="auth-link auth-link--register">이미 계정이 있으신가요? <a href="/login.html">로그인</a></p>
        </div>

        <!-- 2페이지: 나만의 박자 -->
        <div class="register-step register-step--hidden" id="step2" data-step="2">
          <p class="register-step-label">2</p>
          <h2 class="register-step-title">나만의 박자를 만들어보세요.</h2>
          <div class="register-step-rhythm-words" id="rhythmWordsContainer" aria-hidden="true"></div>
          <p class="auth-error" id="authErrorStep2"></p>
          <div class="rhythm-drum-wrap">
            <div class="rhythm-drum-area" id="rhythmDrum2" role="button" tabindex="0" aria-label="북 두드리기">
              <div class="rhythm-drum"></div>
              <p class="rhythm-drum-count" id="rhythmDrumCount2" aria-live="polite"></p>
            </div>
            <p class="register-step-desc register-step-desc--below-drum">북을 4번 이상 두드려 주세요.</p>
          </div>
          <div class="register-step-actions">
            <button type="button" id="btnPrev2" class="auth-submit-btn register-step-btn register-step-btn--secondary">이전</button>
          </div>
        </div>

        <!-- 3페이지: 똑같이 한 번 더 -->
        <div class="register-step register-step--hidden" id="step3" data-step="3">
          <p class="register-step-label">3</p>
          <h2 class="register-step-title">똑같이 한 번 더 쳐 보세요</h2>
          <p class="auth-error" id="authErrorStep3"></p>
          <div class="rhythm-drum-wrap">
            <div class="rhythm-drum-area" id="rhythmDrum3" role="button" tabindex="0" aria-label="북 두드리기">
              <div class="rhythm-drum"></div>
              <p class="rhythm-drum-count" id="rhythmDrumCount3" aria-live="polite"></p>
            </div>
            <p class="register-step-desc register-step-desc--below-drum">북을 4번 이상 두드려 주세요.</p>
          </div>
          <div class="register-step-actions">
            <button type="button" id="btnPrev3" class="auth-submit-btn register-step-btn register-step-btn--secondary">이전</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 가입 완료 (잘했어요 + 환영) -->
  <div id="registerWelcomeLayer" class="register-welcome-layer" style="display:none;">
    <div class="register-welcome-card-wrap">
      <div class="register-welcome-card">
        <h2 class="register-welcome-subtitle">잘했어요!</h2>
        <p class="register-welcome-clap" aria-hidden="true">👏</p>
        <p class="register-welcome-remember">잊지 마세요! "비밀번호는 리듬"</p>
      </div>
    </div>
    <a href="/login.html" id="registerWelcomeBtn" class="register-welcome-btn">로그인 하기</a>
  </div>

  <script src="js/rhythm.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav-logo.js"></script>
  <script>
    (function () {
      var nicknameRegex = /^[a-zA-Z0-9]{5,12}$/;
      var nicknameCheckTimer = null;
      var displayNameInput = document.getElementById('displayName');
      var nicknameValidationEl = document.getElementById('nicknameValidation');
      var authErrorEl = document.getElementById('authError');
      var authErrorStep2 = document.getElementById('authErrorStep2');
      var authErrorStep3 = document.getElementById('authErrorStep3');

      var step1 = document.getElementById('step1');
      var step2 = document.getElementById('step2');
      var step3 = document.getElementById('step3');
      var btnNext1 = document.getElementById('btnNext1');
      var btnPrev2 = document.getElementById('btnPrev2');
      var btnPrev3 = document.getElementById('btnPrev3');

      var rhythmDrum2 = document.getElementById('rhythmDrum2');
      var rhythmDrumCount2 = document.getElementById('rhythmDrumCount2');
      var rhythmDrum3 = document.getElementById('rhythmDrum3');
      var rhythmDrumCount3 = document.getElementById('rhythmDrumCount3');

      var welcomeLayer = document.getElementById('registerWelcomeLayer');

      var firstTimestamps = null;
      var stopRecording2 = null;
      var stopRecording3 = null;

      var RHYTHM_SOUNDS = ['쿵', '짝'];

      function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      /** 쿵/짝 + _ 로 한 문장 패턴 랜덤 생성, 총 글자 수 4~5개 (예: 쿵_쿵쿵_쿵) */
      function generateOneRhythmPattern() {
        var sound = RHYTHM_SOUNDS[randomInt(0, 1)];
        var total = randomInt(4, 5);
        var groupCount = randomInt(2, Math.min(4, total));
        var counts = [];
        for (var c = 0; c < groupCount; c++) counts[c] = 1;
        for (var r = total - groupCount; r > 0; r--) {
          counts[randomInt(0, groupCount - 1)]++;
        }
        return counts.map(function (n) { return Array(n + 1).join(sound); }).join('_');
      }

      /** 3개 문구 패턴 랜덤 생성, 1·2·3줄 중복 없음 */
      function generateRhythmWordSamples() {
        var seen = {};
        var out = [];
        while (out.length < 3) {
          var p = generateOneRhythmPattern();
          if (!seen[p]) {
            seen[p] = true;
            out.push(p);
          }
        }
        return out;
      }

      function shuffleArray(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var t = a[i]; a[i] = a[j]; a[j] = t;
        }
        return a;
      }

      function fillRhythmWords() {
        var container = document.getElementById('rhythmWordsContainer');
        if (!container) return;
        container.innerHTML = '';
        var samples = generateRhythmWordSamples();
        shuffleArray(samples).forEach(function (text) {
          var span = document.createElement('span');
          span.className = 'rhythm-word';
          span.textContent = text;
          container.appendChild(span);
        });
      }

      function showStep(stepEl) {
        [step1, step2, step3].forEach(function (el) {
          if (el) el.classList.add('register-step--hidden');
        });
        if (stepEl) stepEl.classList.remove('register-step--hidden');
      }

      function clearErrors() {
        if (authErrorEl) authErrorEl.textContent = '';
        if (authErrorStep2) authErrorStep2.textContent = '';
        if (authErrorStep3) authErrorStep3.textContent = '';
      }

      function playDrumHit(drumEl) {
        if (!drumEl) return;
        drumEl.classList.add('hit');
        var ring = document.createElement('div');
        ring.className = 'rhythm-drum-ring';
        drumEl.appendChild(ring);
        setTimeout(function () { drumEl.classList.remove('hit'); }, 220);
        setTimeout(function () {
          if (ring.parentNode) ring.parentNode.removeChild(ring);
        }, 650);
      }

      // ——— 1페이지: 닉네임 ———
      if (displayNameInput) {
        displayNameInput.addEventListener('input', function () {
          var v = this.value.replace(/[^a-zA-Z0-9]/g, '').slice(0, 12);
          if (v !== this.value) this.value = v;
          nicknameValidationEl.textContent = '';
          nicknameValidationEl.classList.remove('wallet-validation--err', 'wallet-validation--ok');
          if (v.length > 0 && v.length < 5) nicknameValidationEl.textContent = '5~12자로 입력해 주세요.';
          else if (v.length >= 5 && !nicknameRegex.test(v)) nicknameValidationEl.textContent = '영문, 숫자만 가능해요.';
          else if (v.length >= 5) {
            if (nicknameCheckTimer) clearTimeout(nicknameCheckTimer);
            nicknameCheckTimer = setTimeout(function () {
              nicknameCheckTimer = null;
              fetch('/api/public/check-nickname?displayName=' + encodeURIComponent(v))
                .then(function (r) { return r.json(); })
                .then(function (data) {
                  if (displayNameInput.value.trim() !== v) return;
                  if (data.available) {
                    nicknameValidationEl.textContent = '사용 가능해요!';
                    nicknameValidationEl.classList.remove('wallet-validation--err');
                    nicknameValidationEl.classList.add('wallet-validation--ok');
                  } else {
                    nicknameValidationEl.textContent = data.message || '이미 사용 중이에요.';
                    nicknameValidationEl.classList.remove('wallet-validation--ok');
                    nicknameValidationEl.classList.add('wallet-validation--err');
                  }
                })
                .catch(function () {});
            }, 400);
          }
          updateNext1State();
        });
      }

      function updateNext1State() {
        var v = displayNameInput ? displayNameInput.value.trim() : '';
        var ok = v.length >= 5 && nicknameRegex.test(v) && /[a-zA-Z]/.test(v);
        btnNext1.disabled = !ok;
      }

      btnNext1.addEventListener('click', function () {
        var v = displayNameInput ? displayNameInput.value.trim() : '';
        if (v.length < 5 || !nicknameRegex.test(v) || !/[a-zA-Z]/.test(v)) return;
        clearErrors();
        firstTimestamps = null;
        showStep(step2);
        startDrumRecorder2();
      });

      btnPrev2.addEventListener('click', function () {
        clearErrors();
        if (stopRecording2) try { stopRecording2(); } catch (e) {}
        showStep(step1);
      });

      btnPrev3.addEventListener('click', function () {
        clearErrors();
        if (stopRecording3) try { stopRecording3(); } catch (e) {}
        firstTimestamps = null;
        showStep(step2);
        startDrumRecorder2();
      });

      // ——— 2페이지: 첫 번째 리듬 ———
      function startDrumRecorder2() {
        fillRhythmWords();
        if (stopRecording2) try { stopRecording2(); } catch (e) {}
        if (!rhythmDrum2 || !window.TornFiRhythm) return;
        if (rhythmDrumCount2) rhythmDrumCount2.textContent = '';
        if (authErrorStep2) authErrorStep2.textContent = '';
        rhythmDrum2.removeAttribute('aria-disabled');

        stopRecording2 = window.TornFiRhythm.recordRhythm(rhythmDrum2, {
          onTap: function (n) {
            playDrumHit(rhythmDrum2);
            if (rhythmDrumCount2) {
              rhythmDrumCount2.textContent = n;
              rhythmDrumCount2.classList.remove('rhythm-drum-count--pop');
              rhythmDrumCount2.offsetHeight;
              rhythmDrumCount2.classList.add('rhythm-drum-count--pop');
              clearTimeout(rhythmDrumCount2._popTimer);
              rhythmDrumCount2._popTimer = setTimeout(function () { rhythmDrumCount2.classList.remove('rhythm-drum-count--pop'); }, 220);
            }
          },
          onComplete: function (timestamps) {
            if (!timestamps || timestamps.length < window.TornFiRhythm.RHYTHM_MIN_TAPS) {
              if (authErrorStep2) authErrorStep2.textContent = '4번 이상 두드려 주세요.';
              if (rhythmDrumCount2) rhythmDrumCount2.textContent = '';
              startDrumRecorder2();
              return;
            }
            firstTimestamps = timestamps;
            if (rhythmDrumCount2) rhythmDrumCount2.textContent = '좋아요!';
            clearErrors();
            showStep(step3);
            startDrumRecorder3();
          },
        });
      }

      // ——— 3페이지: 똑같이 한 번 더 ———
      function startDrumRecorder3() {
        if (stopRecording3) try { stopRecording3(); } catch (e) {}
        if (!rhythmDrum3 || !window.TornFiRhythm) return;
        if (rhythmDrumCount3) rhythmDrumCount3.textContent = '';
        if (authErrorStep3) authErrorStep3.textContent = '';
        rhythmDrum3.removeAttribute('aria-disabled');

        stopRecording3 = window.TornFiRhythm.recordRhythm(rhythmDrum3, {
          onTap: function (n) {
            playDrumHit(rhythmDrum3);
            if (rhythmDrumCount3) {
              rhythmDrumCount3.textContent = n;
              rhythmDrumCount3.classList.remove('rhythm-drum-count--pop');
              rhythmDrumCount3.offsetHeight;
              rhythmDrumCount3.classList.add('rhythm-drum-count--pop');
              clearTimeout(rhythmDrumCount3._popTimer);
              rhythmDrumCount3._popTimer = setTimeout(function () { rhythmDrumCount3.classList.remove('rhythm-drum-count--pop'); }, 220);
            }
          },
          onComplete: function (timestamps) {
            if (!timestamps || timestamps.length < window.TornFiRhythm.RHYTHM_MIN_TAPS) {
              if (authErrorStep3) authErrorStep3.textContent = '4번 이상 두드려 주세요.';
              if (rhythmDrumCount3) rhythmDrumCount3.textContent = '';
              startDrumRecorder3();
              return;
            }

            if (!window.TornFiRhythm.rhythmMatch(firstTimestamps, timestamps)) {
              if (authErrorStep3) authErrorStep3.textContent = '리듬이 달라요. 2번으로 돌아가서 다시 쳐 주세요.';
              if (rhythmDrumCount3) rhythmDrumCount3.textContent = '';
              firstTimestamps = null;
              setTimeout(function () {
                showStep(step2);
                startDrumRecorder2();
              }, 800);
              return;
            }

            // 성공 → 가입 API → 한 페이지(잘하셨어요 + 가입완료)로 표시
            if (stopRecording3) try { stopRecording3(); } catch (e) {}
            showStep(null);

            var displayName = displayNameInput ? displayNameInput.value.trim() : '';
            window.TornFiAuth.registerWithRhythm(displayName, firstTimestamps, undefined)
              .then(function () {
                welcomeLayer.style.display = 'flex';
              })
              .catch(function (err) {
                showStep(step3);
                if (authErrorStep3) authErrorStep3.textContent = (err && err.message) ? String(err.message) : '가입에 실패했어요. 다시 시도해 주세요.';
                startDrumRecorder3();
              });
          },
        });
      }

      window.TornFiAuth.onUser(function (u) {
        var nbtn = document.getElementById('navMenuBtn');
        var nac = document.getElementById('navAdminCenter');
        if (u) {
          if (nbtn) nbtn.style.display = 'none';
          if (nac) nac.style.display = u.isAdmin ? 'inline-flex' : 'none';
        } else {
          if (nbtn) nbtn.style.display = 'none';
          if (nac) nac.style.display = 'none';
        }
      });
      var navMenuBtn = document.getElementById('navMenuBtn');
      var navMenuDropdown = document.getElementById('navMenuDropdown');
      if (navMenuBtn && navMenuDropdown) {
        navMenuBtn.addEventListener('click', function (e) { e.stopPropagation(); navMenuDropdown.classList.toggle('is-open'); navMenuBtn.setAttribute('aria-expanded', navMenuDropdown.classList.contains('is-open')); });
        navMenuDropdown.addEventListener('click', function (e) { e.stopPropagation(); });
        document.addEventListener('click', function () { navMenuDropdown.classList.remove('is-open'); navMenuBtn.setAttribute('aria-expanded', 'false'); });
      }
    })();
  </script>
</body>
</html>
